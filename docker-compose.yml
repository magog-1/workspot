services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - security
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MINIO_URL: ${MINIO_URL:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-workspot}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme123}
    volumes:
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped

  security:
    build: ./security
    expose:
      - "8001"
    depends_on:
      - app
      - db
    environment:
      APP_URL: http://app:8000
      AUTH_SERVICE_URL: http://app:8000
      MINIO_URL: http://minio:9000
      CIRCUIT_BREAKER_THRESHOLD: "5"
      CIRCUIT_BREAKER_TIMEOUT: "60"
      JWT_SECRET: ${SECRET_KEY:-change-me-in-production-min-32-chars!!}
    restart: unless-stopped

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-workspot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-workspot}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme123}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    depends_on:
      - app
      - security
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=45d
    restart: unless-stopped

volumes:
  pgdata:
  prom_data:
  minio_data:
