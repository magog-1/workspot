worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    upstream security_sidecar {
        server security:8001;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50m;

        # Security sidecar diagnostics
        location /security/metrics {
            proxy_pass http://security_sidecar/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
        }

        location /security/health {
            proxy_pass http://security_sidecar/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
        }

        # ALL traffic (including /s3/*) goes through security sidecar.
        # The sidecar enforces JWT before forwarding S3 requests to MinIO.
        location / {
            proxy_pass http://security_sidecar;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }
    }
}
