[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --cov=auth
    --cov=bookings
    --cov=spaces
    --cov=users
    --cov=admin
    --cov=observability
    --cov-report=term-missing
    --cov-report=xml
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that require a real PostgreSQL database
