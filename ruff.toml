target-version = "py312"
line-length = 100

extend-exclude = [
    "migrations",
    "static",
    "templates",
    "__pycache__",
]

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "ASYNC", # flake8-async (важно для asyncio в FastAPI)
]
ignore = [
    "E501",   # длинные строки — контролируем через line-length
    "B008",   # FastAPI Depends/Query/Form в аргументах — стандартный паттерн
    "UP042",  # StrEnum-рефакторинг конфликтует с SQLAlchemy Enum — отложено
    "C408",   # dict() vs {} — стилистический выбор существующего кода
]

[lint.isort]
known-first-party = ["auth", "bookings", "spaces", "users", "admin", "observability"]

[lint.per-file-ignores]
"tests/*" = ["B011", "F401"]
"seed.py" = ["B", "C4"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
