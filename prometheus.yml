global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "workspot-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
  - job_name: "workspot-security"
    metrics_path: /metrics
    static_configs:
      - targets: ["security:8001"]
