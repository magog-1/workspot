{% extends "base.html" %}

{% block title %}Регистрация — WorkSpot{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <h1 class="h4 mb-4 text-center fw-bold">Регистрация в WorkSpot</h1>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/register">
          <div class="mb-3">
            <label for="name" class="form-label">Имя</label>
            <input type="text" name="name" id="name" class="form-control"
                   placeholder="Иван Петров" required autofocus
                   value="{{ name_value or '' }}">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" name="email" id="email" class="form-control"
                   placeholder="you@example.com" required
                   value="{{ email_value or '' }}">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" name="password" id="password"
                   class="form-control" placeholder="Минимум 8 символов" required
                   minlength="8">
          </div>
          <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          Уже есть аккаунт?
          <a href="/auth/login">Войти</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
